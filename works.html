<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
        name="description"
        content="Luna Lin 的动画作品集，包含角色动画、品牌动效与产品演示项目。"
    />
    <title>作品集 | Luna Lin</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-page="works">
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="index.html" aria-label="回到首页">Luna Lin</a>
            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="nav-links">
                <span></span>
                <span></span>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="index.html">首页</a>
                <a href="works.html">作品</a>
                <a href="about.html">关于</a>
                <a href="index.html#contact">联系</a>
            </div>
        </nav>
    </header>

    <main class="page-main">
        <section class="page-hero container reveal">
            <p class="eyebrow">Works</p>
            <h1>作品集</h1>
            <p>
                这里先放一个可直接替换的结构。你把视频文件换进去、把标题改成自己的项目名，就能上线。
            </p>
        </section>

        <section class="section">
            <div class="container works-grid">
                <article class="work-card reveal">
                    <div class="work-media">
                        <video muted loop playsinline poster="assets/images/work-01.svg">
                            <source src="assets/videos/work1.mp4" type="video/mp4" />
                        </video>
                    </div>
                    <div class="work-meta">
                        <p class="work-type">Character Animation</p>
                        <h2>作品名称 01</h2>
                        <p>适合放你最有代表性的角色表演或短片镜头。</p>
                    </div>
                </article>

                <article class="work-card reveal">
                    <div class="work-media">
                        <video muted loop playsinline poster="assets/images/work-02.svg">
                            <source src="assets/videos/work2.mp4" type="video/mp4" />
                        </video>
                    </div>
                    <div class="work-meta">
                        <p class="work-type">Motion Graphics</p>
                        <h2>作品名称 02</h2>
                        <p>适合品牌动画、KV 动效、信息图或节奏感很强的项目。</p>
                    </div>
                </article>

                <article class="work-card reveal">
                    <div class="work-media">
                        <video muted loop playsinline poster="assets/images/work-03.svg">
                            <source src="assets/videos/work3.mp4" type="video/mp4" />
                        </video>
                    </div>
                    <div class="work-meta">
                        <p class="work-type">Product Storytelling</p>
                        <h2>作品名称 03</h2>
                        <p>适合产品功能演示、启动页动画或品牌宣传短视频。</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 Luna Lin. Animator and motion designer.</p>
            <div class="footer-links">
                <a href="mailto:hello@lunalin.studio">邮箱</a>
                <a href="index.html#contact">联系</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
